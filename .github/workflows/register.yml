name: Auto Register opendoor.cn

on:
  workflow_dispatch: # 保留手动触发按钮
  schedule:
    # 含义：每10分钟运行一次 (例如 12:00, 12:10, 12:20...)
    - cron: '*/10 * * * *'


jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install requests selenium undetected-chromedriver

      - name: Run register script with Xvfb
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python register.py 2>&1
        env:
          USE_XVFB: "true"

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: "*.png"
